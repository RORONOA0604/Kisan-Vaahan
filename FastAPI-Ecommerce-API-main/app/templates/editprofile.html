<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kisan Vaahan - My Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'kisan-green': '#22C55E',
            'kisan-dark': '#047857',
            'kisan-light': '#D1FAE5',
            'order-delivered': '#34D399',
            'order-shipped': '#60A5FA',
            'order-processing': '#FBBF24',
            'order-pending': '#FCA5A5',
            'order-cancelled': '#F87171'
          }
        }
      }
    };
  </script>

  <style>
    .fade-in { animation: fadeIn .16s ease both; }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  </style>
</head>

<body class="bg-gray-50 font-sans text-gray-800" >
<!-- HEADER -->
<header class="bg-white shadow-md sticky top-3 z-30" style="zoom: 70%; overflow-x: hidden;">
  <div class="flex justify-between items-center px-6 md:px-10 py-3 max-w-8xl mx-auto">
    <div class="flex items-center space-x-4 cursor-pointer">
      <img src="/static/logo.png" alt="Kisan Vaahan Logo"
           class="h-20 w-20 object-contain transform hover:rotate-12 transition-transform duration-400" />
      <h1 class="text-3xl md:text-4xl font-extrabold text-kisan-dark tracking-tight leading-none transform hover:scale-105 transition-transform duration-300">
        KISAN VAAHAN
      </h1>
    </div>

    <nav class="hidden lg:flex space-x-8 text-2xl font-semibold">
      <a href="{{ url_for('landing_page') }}" class="text-kisan-dark hover:text-kisan-green">Home</a>
      <a href="{{ url_for('about') }}" class="text-kisan-dark hover:text-kisan-green">About</a>
      <a href="{{ url_for('contact') }}" class="text-kisan-dark hover:text-kisan-green">Contact</a>
    </nav>
  </div>
</header>

    
 <div class="flex min-h-[calc(100vh-8rem)] max-w-8xl mx-auto px-6 md:px-10 py-10 gap-8">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white shadow-lg border border-gray-200 p-6 hidden md:flex flex-col justify-between rounded-xl" style="zoom: 70%; overflow-x: hidden;">
    <div>
      <div class="flex items-center space-x-3 mb-4">
        <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 text-2xl">👤</div>
        <div>
          <p class="font-semibold text-lg text-gray-800">Kisan Vaahan</p>
          <p class="text-sm text-gray-500">Buyer Portal</p>
        </div>
      </div>
      <nav>
        <ul class="space-y-2">
          <li>
            <a href="{{ url_for('buyer_market') }}" class="flex items-center p-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-kisan-dark transition">
              <span class="mr-3 text-xl">🛒</span> Marketplace
            </a>
          </li>
          <li>
            <a href="{{ url_for('buyer_orders') }}" class="flex items-center p-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-kisan-dark transition">
              <span class="mr-3 text-xl">📦</span> My Orders
            </a>
          </li>
          <li>
            <a href="{{ url_for('buyer_profile') }}" class="flex items-center p-3 rounded-lg text-kisan-dark bg-kisan-light font-medium hover:bg-kisan-green hover:text-white transition">
              <span class="mr-3 text-xl">👤</span> Profile
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- LOGOUT BUTTON -->
    <div class="mt-6">
      <button onclick="confirmLogout()" class="w-full bg-red-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-600 transition">
        Log Out
      </button>
    </div>
  </aside>

        
       <main class="flex-1 p-6 lg:p-10">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h2 class="text-3xl font-bold text-gray-800 mb-2">Edit Profile</h2>
          <p class="text-gray-600">Update your contact & delivery details.</p>
        </div>
      </div>

      <form id="profileForm" class="bg-white border border-gray-200 rounded-lg p-6 shadow max-w-3xl">
        <div class="flex gap-6 items-start">
          <div>
            <img id="previewImg" src="" alt="image" class="h-28 w-28 rounded-full object-cover border-4 border-kisan-light mb-3"/>
            <label class="block text-sm font-semibold text-gray-700">Change Image</label>
            <input id="imageInput" type="file" accept="image/*" class="mt-2" />
          </div>

          <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="text-sm font-medium text-gray-600">Contact Person</label>
              <input id="contactPerson" class="w-full mt-1 p-2 border rounded-md" />
            </div>

            <div>
              <label class="text-sm font-medium text-gray-600">Company / Name</label>
              <input id="companyName" class="w-full mt-1 p-2 border rounded-md" />
            </div>

            <div>
              <label class="text-sm font-medium text-gray-600">Phone</label>
              <input id="phone" class="w-full mt-1 p-2 border rounded-md" />
            </div>

            <div>
              <label class="text-sm font-medium text-gray-600">Email</label>
              <input id="email" class="w-full mt-1 p-2 border rounded-md" />
            </div>

            <div class="md:col-span-2">
              <label class="text-sm font-medium text-gray-600">Current Address</label>
              <textarea id="currentAddress" rows="2" class="w-full mt-1 p-2 border rounded-md"></textarea>
            </div>

            <div class="md:col-span-2">
              <label class="text-sm font-medium text-gray-600">Delivery Address</label>
              <textarea id="deliveryAddress" rows="2" class="w-full mt-1 p-2 border rounded-md"></textarea>
            </div>

            <div>
              <label class="text-sm font-medium text-gray-600">City</label>
              <input id="city" class="w-full mt-1 p-2 border rounded-md" />
            </div>

            <div>
              <label class="text-sm font-medium text-gray-600">Pincode</label>
              <input id="pincode" class="w-full mt-1 p-2 border rounded-md" />
            </div>

            <div class="md:col-span-2">
              <label class="text-sm font-medium text-gray-600">State</label>
              <input id="state" class="w-full mt-1 p-2 border rounded-md" />
            </div>
          </div>
        </div>

        <div class="flex gap-3 justify-end mt-6">
          <a href="{{ url_for('buyer_edit_profile') }}" class="px-4 py-2 border rounded-md text-gray-700">Cancel</a>
          <button type="submit" class="px-4 py-2 bg-kisan-green text-white rounded-md font-semibold">Save Changes</button>
        </div>
      </form>

    </main>
  </div>

  <!-- FOOTER -->
  <footer class="bg-kisan-dark text-white py-8 text-center" style="zoom: 70%; overflow-x: hidden;">
    <p class="text-lg">© 2025 Kisan Vaahan. All Rights Reserved.</p>
  </footer>

<script>
  const API_BASE = "http://localhost:8000";
  const key = 'buyerProfile';
  const defaultProfile = {
    id: 0,
    username: "User",
    full_name: "User",
    email: "",
    phone: "",
    address: "",
    location: "",
    user_type: "buyer"
  };

  // Get access token or redirect to login
  function getToken() {
    const token = localStorage.getItem('access_token');
    if (!token) {
      window.location.href = "{{ url_for('buyer_login') }}";
    }
    return token;
  }

  async function readProfile() {
    const token = getToken();
    try {
      const res = await fetch(`${API_BASE}/users/me`, {
        headers: { "Authorization": "Bearer " + token }
      });

      if (!res.ok) throw new Error("Failed to fetch profile");

      const json = await res.json();
      const profile = json.data || defaultProfile;
      localStorage.setItem(key, JSON.stringify(profile));
      return profile;
    } catch (err) {
      console.error("readProfile error:", err);
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : defaultProfile;
    }
  }

  async function populateForm() {
    const p = await readProfile();
    document.getElementById('contactPerson').value = p.full_name || '';
    document.getElementById('companyName').value = p.username || '';
    document.getElementById('phone').value = p.phone || '';
    document.getElementById('email').value = p.email || '';
    document.getElementById('currentAddress').value = p.address || '';
    document.getElementById('deliveryAddress').value = p.location || '';
    document.getElementById('city').value = p.city || '';
    document.getElementById('pincode').value = p.pincode || '';
    document.getElementById('state').value = p.state || '';

    const img = document.getElementById('previewImg');
    if (p.image) img.src = p.image;
    else {
      const initials = (p.full_name || p.username || "User").split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect width='100%' height='100%' fill='#D1FAE5'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-size='96' fill='#047857'>${initials}</text></svg>`;
      img.src = 'data:image/svg+xml;base64,' + btoa(svg);
    }
  }

  // handle image upload
  let newImageBase64 = null;
  document.getElementById('imageInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
      newImageBase64 = evt.target.result;
      document.getElementById('previewImg').src = newImageBase64;
    };
    reader.readAsDataURL(file);
  });

  // initialize form on page load
  document.addEventListener('DOMContentLoaded', populateForm);

  // Save handler - call API to update profile
  document.getElementById('profileForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const token = getToken();

    const updated = {
      full_name: document.getElementById('contactPerson').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim(),
      address: document.getElementById('currentAddress').value.trim(),
      location: document.getElementById('deliveryAddress').value.trim(),
      city: document.getElementById('city').value.trim(),
      pincode: document.getElementById('pincode').value.trim(),
      state: document.getElementById('state').value.trim(),
    };

    // basic validation
    if (!updated.full_name || !updated.phone || !updated.email) {
      alert('Please fill at least name, phone and email.');
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/users/me`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(updated)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Update failed" }));
        throw new Error(err.detail || "Failed to update profile");
      }

      const json = await res.json();
      localStorage.setItem(key, JSON.stringify(json.data));
      alert("Profile updated successfully!");
      window.location.href = "{{ url_for('buyer_profile') }}";
    } catch (err) {
      console.error("Save error:", err);
      alert(err.message || "Failed to update profile");
    }
  });

</script>
</body>
</html>
